name: Генерация PowerPoint-презентации

on:
  push:
    paths:
      - 'create_presentation.py'
  workflow_dispatch:   # даёт кнопку ручного запуска в Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Установить Python и библиотеку
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить python-pptx
        run: pip install python-pptx

      - name: Запустить генерацию презентации
        run: python create_presentation.py

      - name: Закоммитить и запушть PPTX обратно в репозиторий
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Интеграция_Mail_в_VK.pptx
          git commit -m "Авто-генерация презентации" || echo "Нет изменений"
          git push
