name: Генерация PowerPoint-презентации

on:
  push:
    paths:
      - 'create_presentation.py'
  workflow_dispatch:

permissions:
  contents: write   # 👈 разрешаем GitHub Actions записывать файлы в репозиторий

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Установить python-pptx
        run: pip install python-pptx

      - name: Сгенерировать PPTX
        run: python create_presentation.py

      - name: Закоммитить и отправить PPTX
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Интеграция_Mail_в_VK.pptx
          git commit -m "Авто-генерация презентации" || echo "Нет изменений"
          git push
